{{- if .Values.networkPolicy.enabled }}
{{- /*
L (issue #162): optional NetworkPolicy. Default off — many clusters don't run a
NetworkPolicy controller, so shipping it enabled would break installs. When on,
ingress is restricted to the Service port; empty `fromNamespaces` allows traffic
from any namespace inside the cluster (still excludes external traffic that
bypasses the cluster network).
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dotnet-diagnostics-orchestrator.fullname" . }}
  namespace: {{ include "dotnet-diagnostics-orchestrator.namespace" . }}
  labels:
    {{- include "dotnet-diagnostics-orchestrator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dotnet-diagnostics-orchestrator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- $namespaces := .Values.networkPolicy.fromNamespaces }}
        {{- $labels := .Values.networkPolicy.fromPodLabels }}
        {{- if and (gt (len $namespaces) 0) (gt (len $labels) 0) }}
        {{- /* Both filters set — emit one peer per namespace that combines
              namespaceSelector AND podSelector, otherwise Kubernetes ORs the
              peers and the label filter is effectively bypassed. */}}
        {{- range $namespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
          podSelector:
            matchLabels:
              {{- toYaml $labels | nindent 14 }}
        {{- end }}
        {{- else if gt (len $namespaces) 0 }}
        {{- range $namespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- else if gt (len $labels) 0 }}
        - podSelector:
            matchLabels:
              {{- toYaml $labels | nindent 14 }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
