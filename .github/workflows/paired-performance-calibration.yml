name: Paired Performance Calibration

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Baseline ref or immutable SHA
        required: true
        default: main
      candidate_ref:
        description: Candidate ref or immutable SHA (defaults to the dispatched ref SHA)
        required: false
        default: ""
      prior_run_ids:
        description: Optional comma/space-separated calibration run IDs to include
        required: false
        default: ""
  pull_request:
    types: [labeled]
  schedule:
    # Three adjacent UTC days maximize the chance of retaining one exact hosted
    # image version while still keeping calibration off the required-check path.
    - cron: "23 4 * * 2,3,4"

permissions:
  actions: read
  contents: read

jobs:
  hosted-cohort:
    name: Hosted allocation ${{ matrix.cohort }}
    if: >-
      github.event_name != 'pull_request'
      || github.event.label.name == 'run-paired-calibration'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        cohort: [1, 2, 3]
    uses: ./.github/workflows/paired-performance-experiment.yml
    with:
      baseline_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_ref || 'main' }}
      candidate_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.candidate_ref || github.sha }}
      cohort_id: hosted-${{ matrix.cohort }}
      evidence_scope: independent_github_hosted_allocation
      runner_class: github-hosted-ubuntu-latest
      runner_label: ubuntu-latest
      runner_kind: github_hosted
      runs_on_json: '["ubuntu-latest"]'

  dedicated-cohort:
    name: Dedicated calibration cohort
    if: >-
      vars.PERF_DEDICATED_RUNNER_ENABLED == 'true'
      && (github.event_name == 'schedule'
        || (github.event_name == 'workflow_dispatch'
          && github.ref == 'refs/heads/main'
          && inputs.baseline_ref == 'main'
          && (inputs.candidate_ref == '' || inputs.candidate_ref == 'main')))
    uses: ./.github/workflows/paired-performance-experiment.yml
    with:
      baseline_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_ref || 'main' }}
      candidate_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.candidate_ref || github.sha }}
      cohort_id: dedicated
      evidence_scope: verified_dedicated_runner
      runner_class: dedicated-linux-x64
      runner_label: self-hosted,linux,x64,dotnet-diagnostics-perf
      runner_kind: dedicated
      runs_on_json: '["self-hosted","linux","x64","dotnet-diagnostics-perf"]'

  aggregate:
    name: Aggregate hosted calibration cohorts
    needs: [hosted-cohort, dedicated-cohort]
    if: >-
      always()
      && needs.hosted-cohort.result == 'success'
      && (needs.dedicated-cohort.result == 'success'
        || needs.dedicated-cohort.result == 'skipped')
      && (github.event_name != 'pull_request'
        || github.event.label.name == 'run-paired-calibration')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Download current independent cohorts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: paired-performance-cohort-*
          path: artifacts/calibration/current

      - name: Download requested or prior scheduled days
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRIOR_RUN_IDS: ${{ inputs.prior_run_ids }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/calibration/prior
          run_ids=()
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            scheduled_ids=$(
              gh api \
                "repos/$GITHUB_REPOSITORY/actions/workflows/paired-performance-calibration.yml/runs?event=schedule&status=success&per_page=5" \
                --jq ".workflow_runs[] | select(.id != $GITHUB_RUN_ID) | .id"
            )
            if [[ -n "$scheduled_ids" ]]; then
              mapfile -t run_ids <<< "$scheduled_ids"
            fi
          elif [[ -n "${PRIOR_RUN_IDS//[[:space:],]/}" ]]; then
            normalized=${PRIOR_RUN_IDS//,/ }
            read -r -a run_ids <<< "$normalized"
          fi

          for run_id in "${run_ids[@]}"; do
            [[ "$run_id" =~ ^[0-9]+$ ]] || {
              echo "Invalid prior run ID: $run_id" >&2
              exit 2
            }
            gh run download "$run_id" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern 'paired-performance-cohort-*' \
              --dir "artifacts/calibration/prior/$run_id"
          done

      - name: Build calibration analyzer
        shell: bash
        run: |
          dotnet restore benchmarks/DiagnosedBenchmarks/DiagnosedBenchmarks.csproj
          dotnet build benchmarks/DiagnosedBenchmarks/DiagnosedBenchmarks.csproj \
            --configuration Release --no-restore

      - name: Aggregate exact-compatible cohorts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' cohort_files < <(
            find artifacts/calibration/current artifacts/calibration/prior \
              -type f -name cohort.json -print0 | sort -z
          )
          if (( ${#cohort_files[@]} < 2 )); then
            echo "Calibration requires evidence from more than one independent runner allocation." >&2
            exit 1
          fi
          cohort_args=()
          for cohort in "${cohort_files[@]}"; do
            cohort_args+=(--cohort "$cohort")
          done
          dotnet run \
            --project benchmarks/DiagnosedBenchmarks/DiagnosedBenchmarks.csproj \
            --configuration Release --no-build -- \
            perf-regression calibration-report \
            "${cohort_args[@]}" \
            --output-evidence artifacts/calibration/output/evidence.json \
            --output-json artifacts/calibration/output/report.json \
            --output-markdown artifacts/calibration/output/report.md
          cat artifacts/calibration/output/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload policy-neutral cohort evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-calibration-evidence-${{ github.run_attempt }}
          path: artifacts/calibration/output/evidence.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload policy-derived calibration report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-calibration-report-${{ github.run_attempt }}
          path: |
            artifacts/calibration/output/report.json
            artifacts/calibration/output/report.md
          if-no-files-found: error
          retention-days: 90

  # The repository runner API reported zero configured runners during #651.
  # The dedicated call remains skipped unless an operator first verifies the
  # exact label set and explicitly enables PERF_DEDICATED_RUNNER_ENABLED. It
  # never executes pull-request code on the persistent runner.
