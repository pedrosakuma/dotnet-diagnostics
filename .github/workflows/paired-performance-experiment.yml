name: Paired Performance Experiment

on:
  workflow_call:
    inputs:
      baseline_ref:
        description: Baseline ref or immutable SHA
        required: true
        type: string
      candidate_ref:
        description: Candidate ref or immutable SHA
        required: true
        type: string
      cohort_id:
        description: Unique cohort identifier within the caller workflow
        required: true
        type: string
      evidence_scope:
        description: Policy-neutral evidence scope
        required: true
        type: string
      runner_class:
        description: Stable runner class recorded in measurement provenance
        required: false
        default: github-hosted-ubuntu-latest
        type: string
      runner_label:
        description: Human-readable runner label contract
        required: false
        default: ubuntu-latest
        type: string
      runner_kind:
        description: Calibration runner population
        required: false
        default: github_hosted
        type: string
      runs_on_json:
        description: JSON array passed to runs-on by a verified caller
        required: false
        default: '["ubuntu-latest"]'
        type: string
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Main/baseline ref or immutable SHA
        required: true
        default: main
      candidate_ref:
        description: PR head ref or immutable SHA (defaults to the dispatched ref SHA)
        required: false
        default: ""
  # GitHub cannot workflow_dispatch a new workflow until the file exists on the
  # default branch. The exact opt-in label provides a human-triggered path for
  # the stacked experiment; ordinary PR activity never starts this job.
  pull_request:
    types: [labeled]

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  paired-performance-experiment:
    name: Manual advisory paired-ref experiment
    if: >-
      github.event_name == 'workflow_call'
      || github.event_name == 'workflow_dispatch'
      || github.event.label.name == 'run-paired-performance'
    runs-on: ${{ fromJSON(inputs.runs_on_json || '["ubuntu-latest"]') }}
    timeout-minutes: 45
    steps:
      - name: Start feasibility clock
        shell: bash
        run: echo "JOB_START_UNIX_MS=$(date +%s%3N)" >> "$GITHUB_ENV"

      - name: Checkout experiment orchestration
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: orchestration
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: orchestration/global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: paired-perf-${{ runner.os }}-${{ hashFiles('orchestration/Directory.Packages.props', 'orchestration/**/*.csproj') }}
          restore-keys: |
            paired-perf-${{ runner.os }}-

      - name: Checkout, build, and run three alternating clean pairs
        shell: bash
        env:
          BASELINE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_ref }}
          CANDIDATE_REF_INPUT: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.candidate_ref }}
          COHORT_ID: ${{ inputs.cohort_id || 'single' }}
          EVIDENCE_SCOPE: ${{ inputs.evidence_scope || 'single_github_hosted_vm' }}
          RUNNER_CLASS: ${{ inputs.runner_class || 'github-hosted-ubuntu-latest' }}
        run: |
          candidate_ref="${CANDIDATE_REF_INPUT:-$GITHUB_SHA}"
          bash orchestration/scripts/run-paired-performance-experiment.sh \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" \
            "$BASELINE_REF" \
            "$candidate_ref" \
            "$GITHUB_WORKSPACE" \
            "$RUNNER_CLASS" \
            "${ImageOS:-unknown}-${ImageVersion:-unknown}" \
            "github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${COHORT_ID}"

      - name: Build preliminary advisory report
        shell: bash
        run: |
          root="$GITHUB_WORKSPACE"
          report_started=$(date +%s%N)
          pair_args=()
          for pair in 1 2 3; do
            if (( pair % 2 == 1 )); then order=main_then_pr; else order=pr_then_main; fi
            pair_args+=(--pair "$pair|$order|$root/artifacts/paired/compact/measurements/main-$pair.json|$root/artifacts/paired/compact/measurements/pull_request-$pair.json")
          done
          (
            cd refs/pr/benchmarks/DiagnosedBenchmarks
            dotnet run --project . \
              --configuration Release --no-build -- \
              perf-regression paired-report \
              "${pair_args[@]}" \
              --diagnostic "$root/artifacts/paired/compact/diagnostic.json" \
              --stage-metrics "$root/artifacts/paired/stages.tsv" \
              --job-start-unix-ms "$JOB_START_UNIX_MS" \
              --evidence-scope "$EVIDENCE_SCOPE" \
              --compact-root "$root/artifacts/paired/compact" \
              --raw-root "$root/artifacts/paired/raw" \
              --output-manifest "$root/artifacts/paired/preliminary-evidence/manifest.json" \
              --output-feasibility "$root/artifacts/paired/preliminary-evidence/feasibility.json" \
              --output-json "$root/artifacts/paired/preliminary-report/report.json" \
              --output-markdown "$root/artifacts/paired/preliminary-report/report.md"
          )
          report_ended=$(date +%s%N)
          report_seconds=$(awk -v start="$report_started" -v end="$report_ended" 'BEGIN { printf "%.4f", (end - start) / 1000000000 }')
          report_bytes=$(find artifacts/paired/preliminary-report -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          printf 'report\treport-generation\t%s\t%s\t\t\n' "$report_seconds" "$report_bytes" >> artifacts/paired/stages.tsv

      - name: Start compact evidence upload clock
        shell: bash
        run: |
          echo "COMPACT_UPLOAD_START_NS=$(date +%s%N)" >> "$GITHUB_ENV"
          bytes=$(find artifacts/paired/compact -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          echo "COMPACT_UPLOAD_BYTES=$bytes" >> "$GITHUB_ENV"

      - name: Upload immutable compact evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-compact-${{ inputs.cohort_id || 'single' }}-${{ github.run_attempt }}
          path: |
            artifacts/paired/compact/measurements
            artifacts/paired/compact/diagnostic.json
          if-no-files-found: error
          retention-days: 90

      - name: Record compact upload feasibility
        shell: bash
        run: |
          ended=$(date +%s%N)
          seconds=$(awk -v start="$COMPACT_UPLOAD_START_NS" -v end="$ended" 'BEGIN { printf "%.4f", (end - start) / 1000000000 }')
          printf 'upload\tupload-compact\t%s\t%s\t\t\n' "$seconds" "$COMPACT_UPLOAD_BYTES" >> artifacts/paired/stages.tsv

      - name: Start raw evidence upload clock
        shell: bash
        run: |
          echo "RAW_UPLOAD_START_NS=$(date +%s%N)" >> "$GITHUB_ENV"
          bytes=$(find artifacts/paired/raw -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          echo "RAW_UPLOAD_BYTES=$bytes" >> "$GITHUB_ENV"

      - name: Upload short-lived raw evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-raw-${{ inputs.cohort_id || 'single' }}-${{ github.run_attempt }}
          path: artifacts/paired/raw
          if-no-files-found: error
          retention-days: 30

      - name: Record raw upload feasibility
        shell: bash
        run: |
          ended=$(date +%s%N)
          seconds=$(awk -v start="$RAW_UPLOAD_START_NS" -v end="$ended" 'BEGIN { printf "%.4f", (end - start) / 1000000000 }')
          printf 'upload\tupload-raw\t%s\t%s\t\t\n' "$seconds" "$RAW_UPLOAD_BYTES" >> artifacts/paired/stages.tsv

      # Regenerate from the same immutable captures after the bulk upload stages
      # are known. The tiny final metadata upload is intentionally not included
      # in the cost model; its input size remains visible in the artifact.
      - name: Finalize advisory report and summary
        shell: bash
        env:
          COHORT_ID: ${{ inputs.cohort_id || 'single' }}
          EVIDENCE_SCOPE: ${{ inputs.evidence_scope || 'single_github_hosted_vm' }}
          RUNNER_LABEL: ${{ inputs.runner_label || 'ubuntu-latest' }}
          RUNNER_KIND: ${{ inputs.runner_kind || 'github_hosted' }}
        run: |
          root="$GITHUB_WORKSPACE"
          source "$root/artifacts/paired/refs.env"
          allocation_id="github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${COHORT_ID}-${RUNNER_NAME:-unknown}"
          pair_args=()
          for pair in 1 2 3; do
            if (( pair % 2 == 1 )); then order=main_then_pr; else order=pr_then_main; fi
            pair_args+=(--pair "$pair|$order|$root/artifacts/paired/compact/measurements/main-$pair.json|$root/artifacts/paired/compact/measurements/pull_request-$pair.json")
          done
          (
            cd refs/pr/benchmarks/DiagnosedBenchmarks
            dotnet run --project . \
              --configuration Release --no-build -- \
              perf-regression paired-report \
              "${pair_args[@]}" \
              --diagnostic "$root/artifacts/paired/compact/diagnostic.json" \
              --stage-metrics "$root/artifacts/paired/stages.tsv" \
              --job-start-unix-ms "$JOB_START_UNIX_MS" \
              --evidence-scope "$EVIDENCE_SCOPE" \
              --compact-root "$root/artifacts/paired/compact" \
              --raw-root "$root/artifacts/paired/raw" \
              --output-manifest "$root/artifacts/paired/evidence/manifest.json" \
              --output-feasibility "$root/artifacts/paired/evidence/feasibility.json" \
              --output-json "$root/artifacts/paired/report/report.json" \
              --output-markdown "$root/artifacts/paired/report/report.md" \
              --output-cohort "$root/artifacts/paired/cohort/cohort.json" \
              --cohort-id "github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${COHORT_ID}" \
              --allocation-id "$allocation_id" \
              --workflow-run-id "$GITHUB_RUN_ID" \
              --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
              --selected-sdk "$SELECTED_SDK" \
              --runner-kind "$RUNNER_KIND" \
              --runner-label "$RUNNER_LABEL"
          )
          cat artifacts/paired/report/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload final policy-neutral provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-provenance-${{ inputs.cohort_id || 'single' }}-${{ github.run_attempt }}
          path: |
            artifacts/paired/evidence
            artifacts/paired/stages.tsv
            artifacts/paired/refs.env
          if-no-files-found: error
          retention-days: 90

      - name: Upload final policy-derived report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-report-${{ inputs.cohort_id || 'single' }}-${{ github.run_attempt }}
          path: artifacts/paired/report
          if-no-files-found: error
          retention-days: 90

      - name: Upload policy-neutral calibration cohort
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paired-performance-cohort-${{ inputs.cohort_id || 'single' }}-${{ github.run_attempt }}
          path: artifacts/paired/cohort/cohort.json
          if-no-files-found: error
          retention-days: 90
