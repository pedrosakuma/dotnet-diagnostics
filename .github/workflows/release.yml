name: Release

# Publishes NuGet tool package + per-OS single-file binaries on tag push.
# Requires the maintainer to have configured the NUGET_API_KEY secret.
# Container publishing (ghcr.io) is handled by .github/workflows/publish-container.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version suffix to use when invoking manually (e.g. 0.1.0-rc.1). Required for workflow_dispatch.'
        required: true
        type: string

permissions:
  contents: write   # required to create + attach artifacts to a Release
  packages: write   # reserved for future container publishing in this workflow

jobs:
  # ----- 1) Build + publish the NuGet global-tool package -----
  pack-tool:
    name: Pack .NET global tool
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by actions/attest-build-provenance to mint a Sigstore certificate
      # via GitHub's OIDC issuer and publish the attestation back to the repo.
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.derive-version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Derive version from tag (or workflow_dispatch input)
        id: derive-version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: |
          dotnet pack src/DotnetDiagnostics.Core/DotnetDiagnostics.Core.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore
          dotnet pack src/DotnetDiagnostics.BenchmarkDotNet/DotnetDiagnostics.BenchmarkDotNet.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore
          dotnet pack src/DotnetDiagnostics.Mcp/DotnetDiagnostics.Mcp.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore
          dotnet pack src/DotnetDiagnostics.Cli/DotnetDiagnostics.Cli.csproj \
            -c Release \
            -o artifacts/nupkg \
            -p:Version=${{ steps.derive-version.outputs.version }} \
            --no-restore

      - name: Attest nupkg provenance
        # Attests the package bytes that are uploaded as an artifact below; the same
        # bytes are downloaded by the publish-nuget job and pushed to NuGet.org, so
        # consumers verifying the published .nupkg get a matching SLSA attestation.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'artifacts/nupkg/*.nupkg'

      - name: Upload nupkg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg
          path: |
            artifacts/nupkg/*.nupkg
            artifacts/nupkg/*.snupkg
          if-no-files-found: error

  # ----- 2) Build per-OS single-file self-contained binaries -----
  publish-binaries:
    name: Publish single-file binary (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: pack-tool
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: ubuntu-latest,  rid: linux-arm64 }
          - { os: windows-latest, rid: win-x64 }
          - { os: windows-latest, rid: win-arm64 }
          - { os: macos-latest,   rid: osx-arm64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish self-contained single-file binaries
        shell: bash
        run: |
          dotnet publish src/DotnetDiagnostics.Mcp/DotnetDiagnostics.Mcp.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ needs.pack-tool.outputs.version }} \
            -o artifacts/server/${{ matrix.rid }}
          dotnet publish src/DotnetDiagnostics.Cli/DotnetDiagnostics.Cli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PackAsTool=false \
            -p:Version=${{ needs.pack-tool.outputs.version }} \
            -o artifacts/cli/${{ matrix.rid }}

      - name: Rename binaries to their command names
        shell: bash
        # We rename post-publish (instead of -p:AssemblyName=...) because passing
        # AssemblyName as a global MSBuild property propagates to the referenced
        # Core project, renaming its DLL to the same name and triggering NETSDK1152
        # "multiple publish output files with the same relative path". The server's
        # apphost is DotnetDiagnostics.Mcp; the CLI's is dotnet-diagnostics
        # (its csproj AssemblyName) which we surface to users as dotnet-diagnostics-cli.
        run: |
          srv=artifacts/server/${{ matrix.rid }}
          cli=artifacts/cli/${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv "$srv/DotnetDiagnostics.Mcp.exe" "$srv/dotnet-diagnostics-mcp.exe"
            mv "$cli/dotnet-diagnostics.exe" "$cli/dotnet-diagnostics-cli.exe"
          else
            mv "$srv/DotnetDiagnostics.Mcp" "$srv/dotnet-diagnostics-mcp"
            mv "$cli/dotnet-diagnostics" "$cli/dotnet-diagnostics-cli"
          fi

      - name: Archive artifacts
        shell: bash
        run: |
          ver=${{ needs.pack-tool.outputs.version }}
          rid=${{ matrix.rid }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            (cd artifacts/server/$rid && 7z a ../../dotnet-diagnostics-mcp-$ver-$rid.zip dotnet-diagnostics-mcp.exe appsettings*.json)
            (cd artifacts/cli/$rid && 7z a ../../dotnet-diagnostics-cli-$ver-$rid.zip dotnet-diagnostics-cli.exe)
          else
            (cd artifacts/server/$rid && tar -czf ../../dotnet-diagnostics-mcp-$ver-$rid.tar.gz dotnet-diagnostics-mcp appsettings*.json)
            (cd artifacts/cli/$rid && tar -czf ../../dotnet-diagnostics-cli-$ver-$rid.tar.gz dotnet-diagnostics-cli)
          fi

      - name: Attest binary archive provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/dotnet-diagnostics-mcp-*.tar.gz
            artifacts/dotnet-diagnostics-mcp-*.zip
            artifacts/dotnet-diagnostics-cli-*.tar.gz
            artifacts/dotnet-diagnostics-cli-*.zip

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.rid }}
          path: |
            artifacts/dotnet-diagnostics-mcp-*.tar.gz
            artifacts/dotnet-diagnostics-mcp-*.zip
            artifacts/dotnet-diagnostics-cli-*.tar.gz
            artifacts/dotnet-diagnostics-cli-*.zip
          if-no-files-found: error

  # ----- 3) Attach everything to a GitHub Release (tag-driven only) -----
  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [pack-tool, publish-binaries]
    permissions:
      contents: write   # create / update GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create / update Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/nupkg/*.snupkg
            artifacts/binary-*/dotnet-diagnostics-mcp-*
            artifacts/binary-*/dotnet-diagnostics-cli-*

  # ----- 4) Publish NuGet package (gated on NUGET_API_KEY) -----
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack-tool, publish-binaries]
    permissions:
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download nupkg
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY secret not set — skipping NuGet.org publish."
            exit 0
          fi
          dotnet nuget push "artifacts/nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
