name: Kind Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required by dorny/paths-filter on pull_request events (PR list-files REST
  # API). Omitting it 403s the `changes` job and deadlocks the required check.
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Same gate as ci.yml: docs-only changes skip the (expensive) kind steps but
  # the job still runs and reports success so the required check is satisfied.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'

  kind:
    name: Kind Integration (ubuntu-latest)
    needs: changes
    runs-on: ubuntu-latest
    # Acceptance for issue #20 P6: stand up two CoreClrSample replicas on a
    # kind cluster, install the orchestrator Helm chart, port-forward and run
    # the [Category=KindIntegration] xUnit fact. The test attaches by label,
    # identifies the chosen Pod's CoreClrSample PID, and collects real
    # System.Runtime EventCounters through the complete proxy path.
    timeout-minutes: 25
    env:
      SAMPLE_IMAGE: coreclr-sample:p6
      ORCH_IMAGE: dotnet-diagnostics-mcp:p6
      ORCH_NAMESPACE: dotnet-diagnostics-mcp
      SAMPLE_NAMESPACE: p6-sample
      BEARER_TOKEN: kind-test-bearer-token
      KIND_LOCAL_PORT: "5130"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
        with:
          persist-credentials: false

      - name: Setup .NET 10
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-kind-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore + build
        if: needs.changes.outputs.code == 'true'
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Setup Docker Buildx
        if: needs.changes.outputs.code == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # `cache-from`/`cache-to: type=gha` reuses Docker layers across runs via
      # the Actions cache. main's cache is readable by every PR (branch scope);
      # a PR's writes are reused on subsequent pushes to the same PR. `load: true`
      # makes the built image available to `kind load` below.
      - name: Build orchestrator image
        if: needs.changes.outputs.code == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/Dockerfile
          tags: ${{ env.ORCH_IMAGE }}
          load: true
          cache-from: type=gha,scope=kind-orch
          cache-to: type=gha,mode=max,scope=kind-orch

      - name: Build sample image
        if: needs.changes.outputs.code == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: samples/CoreClrSample/Dockerfile
          tags: ${{ env.SAMPLE_IMAGE }}
          load: true
          cache-from: type=gha,scope=kind-sample
          cache-to: type=gha,mode=max,scope=kind-sample

      - name: Create kind cluster
        if: needs.changes.outputs.code == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: p6-kind

      - name: Load images into kind
        if: needs.changes.outputs.code == 'true'
        run: |
          kind load docker-image "${ORCH_IMAGE}" --name p6-kind
          kind load docker-image "${SAMPLE_IMAGE}" --name p6-kind

      - name: Install orchestrator (Helm)
        if: needs.changes.outputs.code == 'true'
        run: |
          kubectl create namespace "${ORCH_NAMESPACE}"
          kubectl -n "${ORCH_NAMESPACE}" create secret generic kind-acceptance-token \
            --from-literal=token="${BEARER_TOKEN}"
          helm install dotnet-dbg-mcp deploy/helm/dotnet-diagnostics-orchestrator \
            --namespace "${ORCH_NAMESPACE}" \
            --set image.repository=dotnet-diagnostics-mcp \
            --set image.tag=p6 \
            --set image.pullPolicy=IfNotPresent \
            --set 'bearerTokens[0].name=kind-acceptance' \
            --set 'bearerTokens[0].valueFrom.secretKeyRef.name=kind-acceptance-token' \
            --set 'bearerTokens[0].valueFrom.secretKeyRef.key=token' \
            --set 'bearerTokens[0].scopes[0]=orchestrator-list' \
            --set 'bearerTokens[0].scopes[1]=orchestrator-attach' \
            --set 'bearerTokens[0].scopes[2]=read-counters' \
            --set 'bearerTokens[0].scopes[3]=metrics-read' \
            --set orchestrator.enabled=true \
            --set orchestrator.ephemeralContainerImage="${ORCH_IMAGE}" \
            --set rbac.scope=cluster \
            --set 'orchestrator.allowedNamespaces[0]'="${SAMPLE_NAMESPACE}" \
            --set 'orchestrator.labelKeyAllowlist[0]'=diagnostics.dotnet.io/prepared \
            --set 'orchestrator.labelKeyAllowlist[1]'=app \
            --set 'orchestrator.labelKeyAllowlist[2]'=p6-target \
            --wait --timeout 3m

      - name: Apply p6 sample manifests
        if: needs.changes.outputs.code == 'true'
        run: |
          kubectl apply -f deploy/k8s/p6-sample/

      - name: Wait for sample pods to be Ready
        if: needs.changes.outputs.code == 'true'
        run: |
          kubectl -n "${SAMPLE_NAMESPACE}" wait --for=condition=Available deploy/p6-sample-a --timeout=3m
          kubectl -n "${SAMPLE_NAMESPACE}" wait --for=condition=Available deploy/p6-sample-b --timeout=3m
          kubectl -n "${SAMPLE_NAMESPACE}" get pods -o wide

      - name: Port-forward orchestrator service (background)
        if: needs.changes.outputs.code == 'true'
        run: |
          ORCH_SVC=$(kubectl -n "${ORCH_NAMESPACE}" get svc \
            -l app.kubernetes.io/instance=dotnet-dbg-mcp \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Forwarding svc/${ORCH_SVC} -> localhost:${KIND_LOCAL_PORT}"
          nohup kubectl -n "${ORCH_NAMESPACE}" port-forward "svc/${ORCH_SVC}" "${KIND_LOCAL_PORT}:5130" \
            > port-forward.log 2>&1 &
          echo $! > port-forward.pid
          # Wait for the listener to be reachable.
          for i in $(seq 1 30); do
            if curl -fsS -m 2 "http://127.0.0.1:${KIND_LOCAL_PORT}/health" >/dev/null 2>&1; then
              echo "orchestrator /health is reachable"
              exit 0
            fi
            sleep 1
          done
          echo "::error::orchestrator port-forward never became reachable"
          cat port-forward.log || true
          exit 1

      - name: Run kind integration test
        if: needs.changes.outputs.code == 'true'
        env:
          DOTNET_DBG_MCP_KIND_TEST: "1"
          DOTNET_DBG_MCP_ORCH_URL: http://127.0.0.1:5130
          DOTNET_DBG_MCP_ORCH_TOKEN: kind-test-bearer-token
          DOTNET_DBG_MCP_KIND_NAMESPACE: p6-sample
          DOTNET_DBG_MCP_KIND_TARGET_LABEL: p6-target=a
          DOTNET_DBG_MCP_KIND_RESPONSE_PATH: ${{ github.workspace }}/TestResults/kind-mcp-responses.jsonl
        run: |
          dotnet test tests/DotnetDiagnostics.Mcp.IntegrationTests/DotnetDiagnostics.Mcp.IntegrationTests.csproj \
            --no-build --configuration Release \
            --filter "Category=KindIntegration" \
            --blame-hang-timeout 5m \
            --logger "trx;LogFileName=kind-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory TestResults

      - name: Diagnostics on failure
        if: ${{ failure() && needs.changes.outputs.code == 'true' }}
        run: |
          {
            echo "===== orchestrator describe ====="
            kubectl -n "${ORCH_NAMESPACE}" describe deploy || true
            kubectl -n "${ORCH_NAMESPACE}" describe pods || true
            echo "===== orchestrator logs ====="
            kubectl -n "${ORCH_NAMESPACE}" logs -l app.kubernetes.io/instance=dotnet-dbg-mcp --all-containers --tail=500 || true
            echo "===== sample pod YAML (includes ephemeralContainerStatuses) ====="
            kubectl -n "${SAMPLE_NAMESPACE}" get pods -o yaml | tee kind-sample-pods.yaml || true
            echo "===== sample describe ====="
            kubectl -n "${SAMPLE_NAMESPACE}" describe pods || true
            echo "===== sample logs ====="
            for p in $(kubectl -n "${SAMPLE_NAMESPACE}" get pods -o name); do
              echo "----- ${p} -----"
              kubectl -n "${SAMPLE_NAMESPACE}" logs "${p}" --all-containers --tail=500 || true
            done
            echo "===== port-forward log ====="
            cat port-forward.log || true
          } 2>&1 | tee kind-diagnostics.log

      - name: Stop port-forward
        if: ${{ always() && needs.changes.outputs.code == 'true' }}
        run: |
          if [ -f port-forward.pid ]; then
            kill "$(cat port-forward.pid)" 2>/dev/null || true
          fi

      - name: Upload kind test artifacts
        if: ${{ always() && needs.changes.outputs.code == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-integration-results
          path: |
            TestResults/**/*.trx
            TestResults/kind-mcp-responses.jsonl
            kind-diagnostics.log
            kind-sample-pods.yaml
            port-forward.log
          if-no-files-found: ignore
